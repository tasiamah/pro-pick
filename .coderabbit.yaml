# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration — https://docs.coderabbit.ai/getting-started/configure-coderabbit
language: en-US

reviews:
  # "chill" produces fewer nitpicks; set to "assertive" for stricter reviews.
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!**/.venv-ci/**"
    - "!**/.ruff_cache/**"
    - "!**/.pytest_cache/**"
    - "!**/*.db"
    - "!**/node_modules/**"

  path_instructions:
    - path: "backend/**"
      instructions: >-
        Python (FastAPI) backend. Expect code that is ruff-clean and typed.
        Watch for: missing tests for new endpoints, unsafe SQL, unvalidated
        input, and leaking secrets/credentials.
    - path: "mobile/**"
      instructions: >-
        Expo / React Native (TypeScript). Watch for type-safety, unnecessary
        re-renders, and hardcoding API keys or endpoints.

  tools:
    ruff:
      enabled: true

chat:
  auto_reply: true
