services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voetbalai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voetbalai}
      POSTGRES_DB: ${POSTGRES_DB:-voetbalai}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-voetbalai}:${POSTGRES_PASSWORD:-voetbalai}@db:5432/${POSTGRES_DB:-voetbalai}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
