name: Changelog

on:
  pull_request:
    # 'labeled'/'unlabeled' so the 'skip-changelog' label re-evaluates the
    # check immediately.
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  changelog:
    name: Changelog entry required
    runs-on: ubuntu-latest
    # Skip the check if the PR is intentionally labeled 'skip-changelog'.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check that CHANGELOG.md was updated
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md was updated in this PR."
          else
            echo "::error::This PR does not update CHANGELOG.md. Add a line under '## [Unreleased]', or label the PR with 'skip-changelog' when a changelog entry is not needed (e.g. docs/CI-only)."
            exit 1
          fi
